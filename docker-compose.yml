services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tours
      POSTGRES_PASSWORD: tours
      POSTGRES_DB: tours
    ports:
      - "5432:5432"
    volumes:
      - tours_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tours"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://tours:tours@postgres:5432/tours
      SEED_PATH: /contracts/tours_seed.json
    ports:
      - "8000:8000"

volumes:
  tours_pgdata:

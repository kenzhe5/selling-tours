<article class="tour-card">
  <a [routerLink]="['/tours', tour().id]" class="block" [attr.aria-label]="'Open ' + tour().title">
    <div class="relative aspect-[4/3] overflow-hidden rounded-[2rem] bg-border">
      <img
        class="h-full w-full object-cover transition duration-200 hover:scale-[1.02]"
        [src]="tour().image_url"
        [alt]="tour().title + ' in ' + tour().country"
        width="640"
        height="480"
        loading="lazy"
      />
      <div class="absolute left-4 top-4 rounded-full bg-paper px-3 py-1 text-xs font-black uppercase tracking-[0.12em] text-ink">
        {{ tour().rating }} rating
      </div>
    </div>
  </a>

  <div class="mt-5 space-y-3">
    <div class="flex items-start justify-between gap-4">
      <div>
        <p class="text-sm font-bold uppercase tracking-[0.16em] text-accent">{{ tour().country }} / {{ tour().city }}</p>
        <h2 class="mt-1 font-display text-3xl font-extrabold leading-tight tracking-[-0.04em]">
          <a [routerLink]="['/tours', tour().id]" class="text-ink no-underline hover:text-accent-dark">{{ tour().title }}</a>
        </h2>
      </div>
      <p class="shrink-0 text-right text-lg font-black text-ink">{{ tour().price | currency: 'USD' : 'symbol' : '1.0-0' }}</p>
    </div>

    <p class="line-clamp-2 text-base leading-7 text-muted">{{ tour().description }}</p>

    <div class="flex flex-wrap items-center gap-2 text-sm font-semibold text-muted">
      <span class="rounded-full border border-border bg-paper px-3 py-1">{{ tour().duration_days }} days</span>
      <span class="rounded-full border border-border bg-paper px-3 py-1">{{ tour().start_date | date: 'MMM d' }}</span>
      <span class="rounded-full border border-border bg-paper px-3 py-1">{{ tour().available_slots }} spots</span>
    </div>
  </div>
</article>
